name: pokedex
description: "Caderneta pessoal de coleção de Pokémon — local-first com sincronização opcional."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Estado / injeção de dependências
  flutter_riverpod: ^2.5.1

  # Base de dados local (offline-first)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # Navegação
  go_router: ^14.2.0

  # Imagens com cache
  cached_network_image: ^3.3.1

  # Fontes do Dex Design System (Fredoka / Nunito / Space Mono)
  google_fonts: ^6.2.1

  # Persistência de preferências (tema, idioma, perfil)
  shared_preferences: ^2.2.3

  # Internacionalização
  intl: any

  # Cliente HTTP da Pokémon TCG API
  dio: ^5.4.3+1
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  google_sign_in: ^7.2.0
  flutter_svg: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Geração de código Drift
  drift_dev: ^2.18.0
  build_runner: ^2.4.11

  # Geração do ícone do launcher (Etapa 3)
  flutter_launcher_icons: ^0.14.4

# Ícone da app (Android). Gera com: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app_icon.png"
  min_sdk_android: 26
  adaptive_icon_background: "#E85661"
  adaptive_icon_foreground: "assets/app_icon_foreground.png"

flutter:
  uses-material-design: true
  # Ativa a geração das localizações a partir dos ficheiros .arb (ver l10n.yaml)
  generate: true
  assets:
    - assets/data/tcg_sets.json
    - assets/logo.png
    - assets/google_g.svg
    - assets/card_back.png
    - assets/empty_listings.png
    - assets/community_empty.png
    - assets/wishlist_empty.png
    - assets/binder_empty.png
    - assets/messages_empty.png
    - assets/avatars/
    - assets/tabs/
